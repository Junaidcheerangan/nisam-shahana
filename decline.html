      animation: fadeUp 0.9s 0.2s both;
      text-align: center;
    }

    .floral {
      position: absolute;
      width: 180px;
      height: 180px;
      pointer-events: none;
      opacity: 0.7;
    }

    .floral-tl {
      top: -10px;
      left: -10px;
    }

    .floral-br {
      bottom: -10px;
      right: -10px;
      transform: scaleX(-1) scaleY(-1);
    }

    .inner {

      z-index: 2;
    }

    .arabic {

  <script>
    // Same API URL used across all pages
    const API_URL = 'https://script.google.com/macros/s/AKfycbwTCXRkaZeA7nwmHtRysG72jGh0_v-BcKwe9w4G-tharYbMtjU3Xs4IQCMdwxUhuLORFg/exec';

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const guestId = urlParams.get('id') || localStorage.getItem('rsvp_id') || '';

      // Always wire the "Changed your mind?" button with the correct ID
      const btn = document.getElementById('reconsiderBtn');
      btn.href = guestId ? ('rsvp.html?id=' + guestId) : 'rsvp.html';

      // ── Record the decline in Google Sheets ──
      // This handles TWO cases:
      //   1. Guest came from index.html "btn-no" → API not called yet → call it now
      //   2. Guest came from rsvp.html "decline" button → API already called → calling again is safe (idempotent)
      if (guestId) {
        // Save ID so other pages can use it
        localStorage.setItem('rsvp_id', guestId);

        // Fire-and-forget — don't block the page render
        fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'submitRSVP',
            id: guestId,
            attending: false,
            guestsCount: 0
          })
        }).catch(() => { /* silent fail — page still works */ });
      }
    });
  </script>
